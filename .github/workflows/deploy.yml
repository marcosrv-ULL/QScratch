name: Build and Sync Folders

on:
  push:
    branches:
      - main # Or the name of your primary branch

jobs:
  build-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch all history to allow pushing changes back
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run build command
        run: npm run build

      - name: Sync directories
        run: |
          # Clean directory B if it exists, then recreate it
          rm -rf ./docs/*
          mkdir -p ./docs
          
          # Copy content from A to B
          cp -r ./packages/scratch-gui/build/. ./docs

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add only changes in directory B
          git add ./path/to/B
          
          # Check if there are changes to commit to avoid errors
          if git diff-index --quiet HEAD; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-sync build output to directory ./docs"
            git push
          fi